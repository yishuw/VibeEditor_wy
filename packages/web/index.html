<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeEditor</title>
    <!-- 基础重置样式：消除浏览器默认边距，确保编辑器全屏填充 -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #app { height: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
    <script>
      (function(){var t=localStorage.getItem('vibeeditor-theme');if(t==='dark'||t==='light'||t==='blue')document.documentElement.setAttribute('data-theme',t);else document.documentElement.setAttribute('data-theme','dark')})();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
